services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Для обращения продюсеров с хоста надо указать localhost
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092'
      # 2. Какие адреса рекламировать клиентам
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9092,EXTERNAL://localhost:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      #  Какой листенер использовать для обмена между брокерами
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    ports:
      - "29092:29092"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list" ]
      interval: 30s
      timeout: 10s
      retries: 5

  spark:
    image: apache/spark-py
    container_name: spark
    depends_on:
      - kafka
    user: root
    ports:
      - "4040:4040"
    volumes:
      - ./spark:/app
      - ./data/static/csv:/data/static/csv
    command: /opt/spark/bin/spark-submit --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.0 /app/main.py

  kafka_clicks_producer:
    build: kafka_producers
    container_name: kafka_clicks_producer
    command: python -u clicks_producer/main.py
    depends_on:
      - kafka
    restart: unless-stopped

  kafka_purchases_producer:
    build: kafka_producers
    container_name: kafka_purchases_producer
    command: python -u purchases_producer/main.py
    depends_on:
      - kafka
    restart: unless-stopped